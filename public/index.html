<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚨 Fire Alarm System</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #0b0b0b;
  color: #fff;
  text-align: center;
}

h1 {
  padding: 20px;
  color: #ff3b3b;
  text-shadow: 0 0 10px red;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: #111;
  border: 1px solid #ff3b3b;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 0 10px rgba(255,0,0,0.3);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.value {
  font-size: 2rem;
  margin-top: 10px;
}

/* Status styles */
.normal {
  color: #00ff88;
}

.gas {
  color: orange;
  animation: pulse 1s infinite;
}

.fire {
  color: red;
  font-weight: bold;
  animation: blink 0.8s infinite;
  text-shadow: 0 0 20px red;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

@keyframes pulse {
  50% { transform: scale(1.1); }
}
</style>
</head>

<body>

<h1>🚨 FIRE & GAS ALARM SYSTEM 🚨</h1>

<div class="container">
  <div class="card"><h3>MQ2 Sensor 1</h3><div id="mq2_1" class="value">--</div></div>
  <div class="card"><h3>MQ2 Sensor 2</h3><div id="mq2_2" class="value">--</div></div>
  <div class="card"><h3>Temperature</h3><div id="temp" class="value">--</div></div>
  <div class="card"><h3>Humidity</h3><div id="hum" class="value">--</div></div>
  <div class="card"><h3>Status</h3><div id="status" class="value">--</div></div>
</div>

<!-- 🚨 Siren -->
<audio id="siren" src="https://www.soundjay.com/misc/sounds/siren.wav"></audio>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBs9WUcCcdLB-9IlWa337lR4Z7H9WEy8D8",
  authDomain: "fire-monitoring-bff33.firebaseapp.com",
  databaseURL: "https://fire-monitoring-bff33-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "fire-monitoring-bff33",
  storageBucket: "fire-monitoring-bff33.appspot.com",
  messagingSenderId: "523252997400",
  appId: "1:523252997400:web:b9caca5d68a5ca5e96126d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let prevTemp = 0;

db.ref("sensor").on("value", (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  document.getElementById("mq2_1").innerText = data.mq2_1;
  document.getElementById("mq2_2").innerText = data.mq2_2;
  document.getElementById("temp").innerText = data.temp + " °C";
  document.getElementById("hum").innerText = data.hum + " %";

  let statusEl = document.getElementById("status");
  let siren = document.getElementById("siren");

  if ((data.temp > prevTemp + 2) && (data.mq2_1 > 650)) {
    statusEl.innerText = "🔥 FIRE ALERT";
    statusEl.className = "value fire";
    siren.play();
  }
  else if (data.mq2_1 > 600) {
    statusEl.innerText = "⚠ GAS LEAK";
    statusEl.className = "value gas";
  }
  else {
    statusEl.innerText = "✅ NORMAL";
    statusEl.className = "value normal";
    siren.pause();
    siren.currentTime = 0;
  }

  prevTemp = data.temp;
});
</script>

</body>
</html>
