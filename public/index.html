<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚨 Fire & Gas Alarm System</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #0b0b0b;
  color: #fff;
  text-align: center;
}

h1 {
  padding: 20px;
  color: red;
  text-shadow: 0 0 15px red;
}

button {
  padding: 12px 20px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: #111;
  border: 1px solid red;
  border-radius: 15px;
  padding: 25px;
  box-shadow: 0 0 15px rgba(255,0,0,0.3);
}

.value {
  font-size: 2rem;
}

.normal { color: #00ff88; }

.gas {
  color: orange;
  animation: pulse 1s infinite;
}

.fire {
  color: red;
  animation: blink 0.7s infinite;
  text-shadow: 0 0 25px red;
}

@keyframes blink { 50% { opacity: 0.3; } }
@keyframes pulse { 50% { transform: scale(1.1); } }
</style>
</head>

<body>

<h1>🚨 FIRE & GAS ALARM SYSTEM 🚨</h1>

<button onclick="unlockAudio()">🔊 ENABLE SOUND</button>

<div class="container">
  <div class="card"><h3>MQ2_1</h3><div id="mq2_1" class="value">--</div></div>
  <div class="card"><h3>MQ2_2</h3><div id="mq2_2" class="value">--</div></div>
  <div class="card"><h3>Temp</h3><div id="temp" class="value">--</div></div>
  <div class="card"><h3>Humidity</h3><div id="hum" class="value">--</div></div>
  <div class="card"><h3>Status</h3><div id="status" class="value">--</div></div>
</div>

<audio id="siren" src="https://www.soundjay.com/misc/sounds/siren.wav"></audio>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBs9WUcCcdLB-9IlWa337lR4Z7H9WEy8D8",
  databaseURL: "https://fire-monitoring-bff33-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let audioUnlocked = false;

function unlockAudio() {
  let siren = document.getElementById("siren");

  siren.muted = true;
  siren.play().then(() => {
    siren.pause();
    siren.currentTime = 0;
    siren.muted = false;
    audioUnlocked = true;

    alert("✅ Sound Enabled");
  }).catch(() => {
    alert("❌ Click again");
  });
}

db.ref("sensor").on("value", (snap) => {
  let data = snap.val();
  if (!data) return;

  let gas = Math.max(data.mq2_1, data.mq2_2);

  document.getElementById("mq2_1").innerText = data.mq2_1;
  document.getElementById("mq2_2").innerText = data.mq2_2;
  document.getElementById("temp").innerText = data.temp + " °C";
  document.getElementById("hum").innerText = data.hum + " %";

  let statusEl = document.getElementById("status");
  let siren = document.getElementById("siren");

  // 🔥 FIRE
  if (data.temp >= 40 && gas >= 600) {
    statusEl.innerText = "🔥 FIRE ALERT";
    statusEl.className = "value fire";

    if (audioUnlocked) {
      siren.loop = true;
      siren.play().catch(()=>{});
    }
  }

  // ⚠ GAS
  else if (gas >= 600) {
    statusEl.innerText = "⚠ GAS LEAK";
    statusEl.className = "value gas";

    if (audioUnlocked) {
      siren.loop = true;
      siren.play().catch(()=>{});
    }
  }

  // ✅ NORMAL
  else {
    statusEl.innerText = "✅ NORMAL";
    statusEl.className = "value normal";

    siren.pause();
    siren.currentTime = 0;
  }
});
</script>

</body>
</html>
