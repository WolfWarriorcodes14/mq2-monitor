<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔥 Smart Fire & Gas Monitoring</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  color: white;
  text-align: center;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 25px;
  border-radius: 20px;
}

.value { font-size: 2rem; }
</style>
</head>

<body>

<h1>🔥 Smart Fire & Gas Monitoring System</h1>

<div class="container">
  <div class="card"><h3>MQ2_1</h3><div id="mq2_1">--</div></div>
  <div class="card"><h3>MQ2_2</h3><div id="mq2_2">--</div></div>
  <div class="card"><h3>Temp</h3><div id="temp">--</div></div>
  <div class="card"><h3>Humidity</h3><div id="hum">--</div></div>
  <div class="card"><h3>Status</h3><div id="status">--</div></div>
</div>

<script>
console.log("🔥 SCRIPT STARTED");

const firebaseConfig = {
  apiKey: "AIzaSyBs9WUcCcdLB-9IlWa337lR4Z7H9WEy8D8",
  databaseURL: "https://fire-monitoring-bff33-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
console.log("🔥 Firebase Initialized");

const db = firebase.database();

db.ref("sensor").on("value", (snapshot) => {
  const data = snapshot.val();
  console.log("📡 DATA:", data);

  if (!data) return;

  document.getElementById("mq2_1").innerText = data.mq2_1;
  document.getElementById("mq2_2").innerText = data.mq2_2;
  document.getElementById("temp").innerText = data.temp;
  document.getElementById("hum").innerText = data.hum;
  document.getElementById("status").innerText = data.status;
});
</script>

</body>
</html>
