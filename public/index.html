<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚨 Fire & Gas Monitor</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Orbitron', sans-serif;
  background: #000;
  color: white;
  text-align: center;
}

h1 {
  color: red;
  text-shadow: 0 0 20px red;
}

button {
  padding: 10px 20px;
  background: red;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #111;
  border: 1px solid red;
  border-radius: 15px;
  padding: 20px;
}

.value {
  font-size: 2rem;
}

.fire {
  color: red;
  animation: blink 0.6s infinite;
}

.normal {
  color: #00ff88;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

canvas {
  max-width: 90%;
  margin: 20px auto;
}
</style>
</head>

<body>

<h1>🚨 FIRE & GAS MONITOR 🚨</h1>

<button onclick="unlockAudio()">🔊 ENABLE SOUND</button>

<div class="container">
  <div class="card"><h3>MQ2_1</h3><div id="mq2_1" class="value">--</div></div>
  <div class="card"><h3>MQ2_2</h3><div id="mq2_2" class="value">--</div></div>
  <div class="card"><h3>Temp</h3><div id="temp" class="value">--</div></div>
  <div class="card"><h3>Humidity</h3><div id="hum" class="value">--</div></div>
  <div class="card"><h3>Status</h3><div id="status" class="value">--</div></div>
</div>

<!-- 📊 GRAPH -->
<canvas id="chart"></canvas>

<audio id="siren" src="alarm_clock.ogg"></audio>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBs9WUcCcdLB-9IlWa337lR4Z7H9WEy8D8",
  databaseURL: "https://fire-monitoring-bff33-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let audioUnlocked = false;

// 🔓 SOUND
function unlockAudio() {
  let s = document.getElementById("siren");
  s.muted = true;
  s.play().then(() => {
    s.pause();
    s.currentTime = 0;
    s.muted = false;
    audioUnlocked = true;
    alert("✅ Sound Enabled");
  });
}

// 📊 CHART SETUP
const ctx = document.getElementById('chart').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [
      {
        label: "Temperature",
        data: [],
        borderWidth: 2
      },
      {
        label: "Gas",
        data: [],
        borderWidth: 2
      }
    ]
  },
  options: {
    responsive: true,
    scales: {
      y: { beginAtZero: true }
    }
  }
});

// 🔥 DATA
db.ref("sensor").on("value", (snap) => {
  const data = snap.val();
  if (!data) return;

  // calibration
  const mq1 = Math.max(0, data.mq2_1 - 80);
  const mq2 = data.mq2_2;
  const gas = Math.max(mq1, mq2);

  // UI update
  document.getElementById("mq2_1").innerText = mq1;
  document.getElementById("mq2_2").innerText = mq2;
  document.getElementById("temp").innerText = data.temp + " °C";
  document.getElementById("hum").innerText = data.hum + " %";

  const statusEl = document.getElementById("status");
  const siren = document.getElementById("siren");

  // 🔥 FIRE LOGIC
  if (data.temp >= 35 && gas >= 600) {
    statusEl.innerText = "🔥 FIRE ALERT";
    statusEl.className = "value fire";

    if (audioUnlocked && siren.paused) {
      siren.loop = true;
      siren.play();
    }
  } else {
    statusEl.innerText = "✅ NORMAL";
    statusEl.className = "value normal";

    siren.pause();
    siren.currentTime = 0;
  }

  // 📊 UPDATE GRAPH
  const time = new Date().toLocaleTimeString();

  chart.data.labels.push(time);
  chart.data.datasets[0].data.push(data.temp);
  chart.data.datasets[1].data.push(gas);

  if (chart.data.labels.length > 20) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
    chart.data.datasets[1].data.shift();
  }

  chart.update();
});
</script>

</body>
</html>
